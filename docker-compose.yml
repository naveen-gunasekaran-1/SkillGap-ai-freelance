services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillgap
      POSTGRES_PASSWORD: skillgap
      POSTGRES_DB: skillgap
    ports:
      - '5432:5432'
    volumes:
      - skillgap_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  skillgap_pg:
